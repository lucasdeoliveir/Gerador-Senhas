<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔐 Gerador de Senhas Seguras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS Variables ─────────────────────────────────────────── */
    :root {
      --bg:        #0a0a0f;
      --surface:   #13131c;
      --border:    #2a2a3d;
      --accent:    #00ff88;
      --accent2:   #ff4d6d;
      --text:      #e8e8f0;
      --muted:     #6b6b8a;
      --mono:      'Space Mono', monospace;
      --sans:      'Syne', sans-serif;
      --radius:    8px;
      --glow:      0 0 20px rgba(0,255,136,0.25);
    }

    /* ── Reset & Base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow orbs */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card ──────────────────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 0 60px rgba(0,0,0,0.5);
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(24px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── Header ────────────────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header .icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: .5rem;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { filter: drop-shadow(0 0 4px var(--accent)); }
      50%      { filter: drop-shadow(0 0 16px var(--accent)); }
    }

    h1 {
      font-family: var(--sans);
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-size: .8rem;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: .3rem;
      letter-spacing: .05em;
    }

    /* ── Password Display ──────────────────────────────────────── */
    .password-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      transition: border-color .2s;
    }

    .password-box:focus-within,
    .password-box.copied { border-color: var(--accent); box-shadow: var(--glow); }

    #password-output {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: .1em;
      word-break: break-all;
      min-height: 1.5rem;
      cursor: default;
      user-select: all;
    }

    #password-output::placeholder { color: var(--muted); font-size: .85rem; }

    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.1rem;
      padding: .3rem;
      border-radius: 4px;
      transition: color .15s, transform .1s;
      flex-shrink: 0;
    }

    .copy-btn:hover { color: var(--accent); transform: scale(1.15); }

    /* ── Strength Bar ──────────────────────────────────────────── */
    .strength-wrap {
      margin-bottom: 1.5rem;
    }

    .strength-label {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .08em;
      display: flex;
      justify-content: space-between;
      margin-bottom: .4rem;
    }

    #strength-text { transition: color .3s; }

    .strength-bar {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      transition: width .4s ease, background .4s ease;
    }

    /* ── Slider ────────────────────────────────────────────────── */
    .field-label {
      font-family: var(--mono);
      font-size: .72rem;
      letter-spacing: .08em;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      margin-bottom: .5rem;
    }

    #length-val {
      font-weight: 700;
      color: var(--accent);
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      outline: none;
      cursor: pointer;
      margin-bottom: 1.5rem;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(0,255,136,.5);
      transition: transform .1s;
    }

    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    /* ── Checkboxes ────────────────────────────────────────────── */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem;
      margin-bottom: 1.5rem;
    }

    .option {
      display: flex;
      align-items: center;
      gap: .6rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .65rem .9rem;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
    }

    .option:hover { border-color: var(--accent); background: rgba(0,255,136,.03); }
    .option.active { border-color: var(--accent); background: rgba(0,255,136,.06); }

    .option input[type=checkbox] { display: none; }

    .check-icon {
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color .15s, background .15s;
      font-size: .6rem;
    }

    .option.active .check-icon {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .opt-text {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .04em;
    }

    .option.active .opt-text { color: var(--text); }

    /* ── Buttons ───────────────────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: .75rem;
    }

    .btn {
      flex: 1;
      padding: .85rem;
      border: none;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .1em;
      cursor: pointer;
      transition: transform .1s, box-shadow .2s;
    }

    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 0 0 rgba(0,255,136,0);
    }

    .btn-primary:hover { box-shadow: var(--glow); }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }

    /* ── Toast ─────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: var(--bg);
      font-family: var(--mono);
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .08em;
      padding: .65rem 1.4rem;
      border-radius: 99px;
      z-index: 999;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Footer ────────────────────────────────────────────────── */
    .footer {
      position: relative;
      z-index: 1;
      margin-top: 1.5rem;
      font-family: var(--mono);
      font-size: .68rem;
      color: var(--muted);
      letter-spacing: .05em;
      text-align: center;
    }

    .footer a { color: var(--muted); text-decoration: none; }
    .footer a:hover { color: var(--accent); }
  </style>
</head>
<body>

  <div class="card" id="app">

    <header class="header">
      <span class="icon">🔐</span>
      <h1>Gerador de <span>Senhas</span></h1>
      <p class="subtitle">// SEGURO · RÁPIDO · LOCAL</p>
    </header>

    <!-- Password output -->
    <div class="password-box" id="pwd-box">
      <input
        type="text"
        id="password-output"
        readonly
        placeholder="clique em GERAR..."
        aria-label="Senha gerada"
        data-testid="password-output"
      />
      <button class="copy-btn" id="copy-btn" title="Copiar senha" aria-label="Copiar senha" data-testid="copy-btn">
        📋
      </button>
    </div>

    <!-- Strength indicator -->
    <div class="strength-wrap">
      <div class="strength-label">
        <span>FORÇA</span>
        <span id="strength-text" data-testid="strength-text">—</span>
      </div>
      <div class="strength-bar">
        <div class="strength-fill" id="strength-fill" data-testid="strength-fill"></div>
      </div>
    </div>

    <!-- Length slider -->
    <div class="field-label">
      <span>COMPRIMENTO</span>
      <span id="length-val" data-testid="length-val">16</span>
    </div>
    <input
      type="range"
      id="length-slider"
      min="6"
      max="64"
      value="16"
      aria-label="Comprimento da senha"
      data-testid="length-slider"
    />

    <!-- Options -->
    <div class="options-grid" id="options-grid">
      <label class="option active" data-for="opt-upper">
        <input type="checkbox" id="opt-upper" checked data-testid="opt-upper" />
        <span class="check-icon">✓</span>
        <span class="opt-text">MAIÚSCULAS</span>
      </label>
      <label class="option active" data-for="opt-lower">
        <input type="checkbox" id="opt-lower" checked data-testid="opt-lower" />
        <span class="check-icon">✓</span>
        <span class="opt-text">MINÚSCULAS</span>
      </label>
      <label class="option active" data-for="opt-numbers">
        <input type="checkbox" id="opt-numbers" checked data-testid="opt-numbers" />
        <span class="check-icon">✓</span>
        <span class="opt-text">NÚMEROS</span>
      </label>
      <label class="option active" data-for="opt-symbols">
        <input type="checkbox" id="opt-symbols" checked data-testid="opt-symbols" />
        <span class="check-icon">✓</span>
        <span class="opt-text">SÍMBOLOS</span>
      </label>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn btn-primary" id="generate-btn" data-testid="generate-btn">
        ⚡ GERAR
      </button>
      <button class="btn btn-secondary" id="clear-btn" data-testid="clear-btn">
        ✕ LIMPAR
      </button>
    </div>

  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <footer class="footer">
    v1.0.0 · gerador-senhas ·
    <a href="https://github.com/SEU_USUARIO/gerador-senhas" target="_blank" rel="noopener">github</a>
    · MIT License
  </footer>

  <script src="password-generator.js"></script>
  <script src="app.js"></script>

</body>
</html>
